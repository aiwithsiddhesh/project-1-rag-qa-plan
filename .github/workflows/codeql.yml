name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "21 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect Python source files
        id: python-source
        shell: bash
        run: |
          set -euo pipefail
          if find src api app eval scripts tests -name "*.py" -print -quit | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Python source files yet; skipping CodeQL analysis."
          fi

      - name: Initialize CodeQL
        if: steps.python-source.outputs.present == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        if: steps.python-source.outputs.present == 'true'
        uses: github/codeql-action/analyze@v4
