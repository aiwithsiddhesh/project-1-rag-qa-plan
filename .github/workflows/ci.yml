name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: test-key-for-ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        shell: bash
        run: |
          set -euo pipefail
          if find src api scripts -name "*.py" -print -quit | grep -q .; then
            mypy src api scripts
          else
            echo "No Python source files yet; skipping mypy."
          fi

      - name: Unit and integration tests
        shell: bash
        run: |
          set -euo pipefail
          if find tests -name "test_*.py" -print -quit | grep -q .; then
            pytest tests -m "not slow"
          else
            echo "No tests yet; skipping pytest."
          fi
