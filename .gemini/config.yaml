have_fun: false
memory_config:
  disabled: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
ignore_patterns:
  - ".codex/**"
  - "data/vectorstore/**"
  - "results/**"
  - ".env"
  - ".env.*"
  - "**/__pycache__/**"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
